# Development profile — connect a la BD del VPS via SSH tunnel
# SSH tunnel: ssh -L 15432:localhost:5432 imap-vps -N
#
# La password se lee de DB_PASSWORD (env var) para no committearla.
# Para dev sin user bpm_app aún, usar admindb. Cuando el user exista:
#   spring.datasource.username=bpm_app
#   spring.datasource.password=${BPM_DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://localhost:15432/iam
spring.datasource.username=admindb
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.com.imap.bpm=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=imap-bpm
management.metrics.tags.environment=dev

# JWT (mismo secret simétrico que IAM y system emiten — HS256/HS512 con keys aceptadas por ambas).
# Si NO se setea → filter degrada a anonymous (útil para smoke tests sin IAM).
jwt.access.secret=${JWT_ACCESS_SECRET:}
