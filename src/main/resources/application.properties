# Common properties (overridden by application-{profile}.properties)
spring.application.name=imap-bpm
server.port=8093
server.servlet.context-path=/imap/bpm

# JPA — set search_path to bpm schema for all queries
spring.jpa.properties.hibernate.default_schema=bpm
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# 404 → handler en lugar de Spring default (cuando esté GlobalExceptionHandler)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Active profile (override con -Dspring.profiles.active=pdn para producción)
spring.profiles.active=dev
