# Common properties (overridden by application-{profile}.properties)
spring.application.name=imap-bpm
server.port=8093
server.servlet.context-path=/imap/bpm

# JPA — set search_path to bpm schema for all queries
spring.jpa.properties.hibernate.default_schema=bpm
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Flyway (estándar de los micros de dominio; reemplaza los Iter*.sql manuales) ───
# El schema bpm ya existe en prod (creado por los Iter*.sql): baseline-on-migrate
# lo adopta sin re-ejecutar historial. V001–V004 son idempotentes (IF NOT EXISTS),
# así que aunque corran sobre prod son no-ops; entornos nuevos replican todo.
spring.flyway.enabled=true
spring.flyway.schemas=bpm
spring.flyway.default-schema=bpm
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.create-schemas=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# 404 → handler en lugar de Spring default (cuando esté GlobalExceptionHandler)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Active profile (override con -Dspring.profiles.active=pdn para producción)
spring.profiles.active=dev

# ─── ServiceTaskRegistry (Fase 0.B.1 — 2026-05-23) ─────────────────────────
# Cuando un service_task tiene serviceCode='inventory.X.Y' y NO hay handler local,
# el Registry rutea via REST a la baseUrl del prefix ('inventory' aquí).
# Override per-env en application-dev.properties / application-pdn.properties si
# las URLs cambian.
# Formato literal de Map — el SpEL `#{${prop:{:}}}` no agrega dotted properties al Map.
bpm.service-tasks.remotes={inventory:'http://localhost:8094/imap/inventory',system:'http://localhost:8092/imap/system',manufacturing:'http://localhost:8095/imap/manufacturing',taxar:'http://localhost:8098/imap/tax-ar',sale:'http://localhost:8103/imap/sale',purchase:'http://localhost:8101/imap/purchase',treasury:'http://localhost:8102/imap/treasury'}
bpm.service-tasks.retry.max-attempts=3
bpm.service-tasks.retry.backoff-ms=1000
bpm.service-tasks.timeout-seconds=30
