# Production profile — sensitive values via environment variables
# Activado con SPRING_PROFILES_ACTIVE=pdn (ver systemd unit del VPS).

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false

logging.level.com.imap.bpm=INFO

# ── CORS ─────────────────────────────────────────────────────────────────────
imap.cors.allowed-origins=https://imaps.com.ar

# ── JWT ─────────────────────────────────────────────────────────────────────
# Mismo secret simétrico que IAM productivo emite (HS512).
# Setear JWT_ACCESS_SECRET en /opt/imap/bpm/.env del VPS.
jwt.access.secret=${JWT_ACCESS_SECRET}

# ── Actuator + Prometheus ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=imap-bpm
management.metrics.tags.environment=pdn

# 404 → handler en lugar de Spring default
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
